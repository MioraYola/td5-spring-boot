openapi: 3.1.0
info:
  title: Ingredient API
  version: 1.0.0
  description: API de gestion d'ingredients
paths:
  /ingredients:
    get:
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Ingredient'


  /ingredients/{id}:
    get:
      parameters:
        - in: path
          name: id
          schema:
            type: integer
          required: true
      responses:
        '200':
          description: Ingredient found by id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ingredient'
        '404':
          description: Ingredient not found
          content:
            text/plain:
              schema:
                type: string
                example: "Ingredient.id=1 is not found"

  /ingredients/{id}/stock:
    get:
      parameters:
        - in: path
          name: id
          schema:
            type: integer
          required: true
        - in: query
          name: at
          required: true
          schema:
            type: string
        - in: query
          name: unit
          required: true
          schema:
            type: string
            enum: [pcs, kg, l]
      responses:
        '200':
          description: Stock value retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngredientStock'
        '400':
          description: Missing query parameters
          content:
            text/plain:
              schema:
                type: string
        '404':
          description: Ingredient not found
          content:
            text/plain:
              schema:
                type: string
  /dishes:
    get:
      responses:
        '200':
          description: List of dishes
          content:
            application/json:
              schema:
                type: array
                items:
                    $ref: '#/components/schemas/Dish'
  /dishes/{id}/ingredients:
    put:
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/Ingredient'
      responses:
        '200':
          description: Ingredients successfully associated/dissociated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Dish'
        '400':
          description: Missing request body
          content:
            text/plain:
              schema:
                type: string
        '404':
          description: Dish not found
          content:
            text/plain:
              schema:
                type: string
components:
  schemas:
    Ingredient:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        category:
          type: string
        price:
          type: number
          format: double
    IngredientStock:
      type: object
      properties:
        unit:
          type: string
          enum: [pcs, kg, l ]
        value:
          type: number
          format: double
    Dish:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        price:
          type: number
          format: double
        ingredients:
          type: array
          items:
            $ref: '#/components/schemas/Ingredient'